# Rollen-Mapping: Authentik-Email → App-Rolle
# Login/Passwörter/Sessions werden vom Herbert-Portal (Authentik) verwaltet.
# Diese Datei enthält NUR noch die App-interne Rollenzuordnung + optional
# einen Username-Alias, damit bestehende per-User-Verzeichnisse
# (/app/users/<username>/) nach dem SSO-Umbau zugreifbar bleiben.

roles:
  s.herbert@herbert.de: admin

default_role: user

# Mapped Authentik-Email auf internen Username (= UserContext-Schlüssel).
# Ohne Eintrag gilt: local-part der Email, Punkte/Bindestriche raus, lowercase.
username_map:
  s.herbert@herbert.de: sherbert
