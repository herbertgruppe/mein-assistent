# .github/risk-rules.yml
# Risk classification rules for code-approval automation.
# Code Reviewer Agent reads this file first; LLM classification is fallback only.
# Sync HIGH patterns with .github/CODEOWNERS @svenherbert entries.
# evaluation: first-match
#
# RULE ORDER MATTERS: with first-match semantics HIGH must precede LOW so a PR
# touching both a HIGH-owned path and a LOW-path (e.g. *.md) is not silently
# downgraded. See HBE-984.
version: 1
rules:
  # --- HIGH: CODEOWNERS @svenherbert (must be first for correct first-match) ---
  - if_paths_match:
      # Plaud API Integration (HBE-984 — was missing, caused LOW misclassification)
      - "api.py"
      - "utils/api_cache.py"
      # Auth, SSO, Crypto, Security
      - "**/auth/**"
      - "utils/auth*"
      - "**/sso/**"
      - "**/crypto/**"
      - "**/security/**"
      # Infrastruktur
      - "nginx/**"
      - "**/docker-compose*.yml"
      - "Dockerfile"
      - "**/Dockerfile*"
      - "**/.env*"
      - ".streamlit/secrets*"
      # Datenbank
      - "**/migrations/**"
      - "migrations/**"
      - "database/**"
      # CI/CD und CODEOWNERS selbst
      - ".github/workflows/**"
      - ".github/CODEOWNERS"
    risk: HIGH
  # --- LOW: Docs, Tests, Lockfiles ---
  - if_paths_match:
      - "docs/**"
      - "README*"
      - "**/*.md"
    risk: LOW
  - if_paths_match:
      - "**/__tests__/**"
      - "**/*.test.ts"
      - "**/*.test.js"
      - "**/*.spec.ts"
      - "**/test_*.py"
    risk: LOW
  - if_paths_match:
      - "package-lock.json"
      - "yarn.lock"
      - "poetry.lock"
    risk: LOW
  # --- MEDIUM: .env examples only (real .env* are HIGH above) ---
  - if_paths_match:
      - ".env.example"
      - "**/.env.example"
      - "**/.env*.example"
      - "**/.env*.template"
      - "**/.env*.sample"
    risk: MEDIUM
  - if_diff_size_gt: 500
    risk_min: MEDIUM
  - default:
      risk: MEDIUM

