name: PR Review via Paperclip
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  pull_request_review:
    types: [submitted]

jobs:
  trigger-code-reviewer:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # For pull_request events: skip closed (handled by auto-close-on-merge)
    # For pull_request_review events: only trigger when svenherbert submits APPROVED
    if: >-
      (github.event_name == 'pull_request' && github.event.action != 'closed') ||
      (github.event_name == 'pull_request_review' &&
       github.event.review.state == 'approved' &&
       github.event.review.user.login == 'svenherbert')
    steps:
      - name: Create or update Paperclip review issue
        env:
          PAPERCLIP_API_URL: ${{ vars.PAPERCLIP_API_URL }}
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
          PAPERCLIP_COMPANY_ID: 9df4976b-9ac8-4e8f-a156-c06c7fa40cdc
          CODE_REVIEWER_AGENT_ID: f2cdbdbc-f456-4ac7-bba6-178ef7422748
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_REPO: ${{ github.repository }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_ACTION: ${{ github.event.action }}
          GH_EVENT_NAME: ${{ github.event_name }}
          REVIEW_REVIEWER: ${{ github.event.review.user.login }}
          REVIEW_STATE: ${{ github.event.review.state }}
        run: |
          set -euo pipefail

          # Build trigger description depending on event type
          if [ "$GH_EVENT_NAME" = "pull_request_review" ]; then
            TRIGGER_INFO="pull_request_review.submitted (reviewer: $REVIEW_REVIEWER, state: $REVIEW_STATE)"
          else
            TRIGGER_INFO="pull_request.$PR_ACTION"
          fi

          # Idempotency key: {repo-name}-pr-{number}
          REPO_NAME=$(echo "$PR_REPO" | cut -d'/' -f2)
          FINGERPRINT="${REPO_NAME}-pr-${PR_NUMBER}"

          # Check for an existing open review issue for this PR
          SEARCH_RESP=$(curl -sS -w "\n%{http_code}" \
            "$PAPERCLIP_API_URL/api/companies/$PAPERCLIP_COMPANY_ID/issues?originFingerprint=${FINGERPRINT}" \
            -H "Authorization: Bearer $PAPERCLIP_API_KEY")
          SEARCH_HTTP=$(echo "$SEARCH_RESP" | tail -1)
          SEARCH_BODY=$(echo "$SEARCH_RESP" | head -n -1)

          EXISTING_ID=""
          if [ "$SEARCH_HTTP" = "200" ]; then
            EXISTING_ID=$(echo "$SEARCH_BODY" | jq -r \
              --arg fp "$FINGERPRINT" \
              '(.issues // .) |
              map(select(.status != "done" and .status != "cancelled" and .originFingerprint == $fp)) |
              first | .id // empty' \
              2>/dev/null || echo "")
          fi

          if [ -n "$EXISTING_ID" ]; then
            # Active review issue exists — post a comment to re-trigger the reviewer
            COMMENT=$(jq -n \
              --arg sha "$PR_HEAD_SHA" \
              --arg trigger "$TRIGGER_INFO" \
              --arg url "$PR_URL" \
              '"Neues Event auf PR (`\($trigger)`):\n\n- Head-SHA: `\($sha)`\n- PR: \($url)\n\nCode Reviewer Agent: bitte PR-Status neu evaluieren."')
            COMMENT_PAYLOAD=$(jq -n --arg body "$COMMENT" '{body: $body}')
            COMMENT_RESP=$(curl -sS -w "\n%{http_code}" -X POST \
              "$PAPERCLIP_API_URL/api/issues/$EXISTING_ID/comments" \
              -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$COMMENT_PAYLOAD")
            C_HTTP=$(echo "$COMMENT_RESP" | tail -1)
            C_BODY=$(echo "$COMMENT_RESP" | head -n -1)
            echo "HTTP: $C_HTTP"
            echo "Response: $C_BODY"
            if [ "$C_HTTP" != "200" ] && [ "$C_HTTP" != "201" ]; then
              echo "::error::Paperclip-Kommentar fehlgeschlagen (HTTP $C_HTTP)"
              exit 1
            fi
            echo "::notice::Kommentar auf bestehendes Issue $EXISTING_ID gepostet (Fingerprint: $FINGERPRINT)"
          else
            # No active review issue — create a new one
            BODY=$(jq -n \
              --arg url "$PR_URL" \
              --arg repo "$PR_REPO" \
              --arg author "$PR_AUTHOR" \
              --arg base "$PR_BASE" \
              --arg sha "$PR_HEAD_SHA" \
              --arg trigger "$TRIGGER_INFO" \
              '"## PR Review angefordert\n\n- Repo: \($repo)\n- PR: \($url)\n- Author: \($author)\n- Base: \($base)\n- Head-SHA: \($sha)\n- Trigger-Event: \($trigger)\n\nCode Reviewer Agent soll: 1) risk-rules.yml im Repo laden, 2) PR-Diff klassifizieren (LOW/MEDIUM/HIGH), 3) GitHub-Review (APPROVE/REQUEST_CHANGES/COMMENT) submitten, 4) bei LOW nach 10 Min Cool-Off auto-mergen, 5) bei MEDIUM Folge-Issue für Lead Engineer anlegen, 6) bei HIGH Sven via Asana eskalieren."')
            PAYLOAD=$(jq -n \
              --arg title "PR Review: $PR_TITLE (#$PR_NUMBER)" \
              --arg desc "$BODY" \
              --arg agent "$CODE_REVIEWER_AGENT_ID" \
              --arg fp "$FINGERPRINT" \
              '{title: $title, description: $desc, assigneeAgentId: $agent, priority: "medium", originFingerprint: $fp}')
            RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
              "$PAPERCLIP_API_URL/api/companies/$PAPERCLIP_COMPANY_ID/issues" \
              -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY_RESP=$(echo "$RESPONSE" | head -n -1)
            echo "HTTP: $HTTP_CODE"
            echo "Response: $BODY_RESP"
            if [ "$HTTP_CODE" != "201" ]; then
              echo "::error::Paperclip-Issue-Erzeugung fehlgeschlagen (HTTP $HTTP_CODE)"
              exit 1
            fi
            ISSUE_ID=$(echo "$BODY_RESP" | jq -r '.identifier')
            echo "::notice::Paperclip-Issue $ISSUE_ID erzeugt (Fingerprint: $FINGERPRINT) -> Code Reviewer wird via wakeOnDemand getriggert"
          fi

  dismiss-blocking-review:
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved' && github.event.review.user.login == 'svenherbert'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Dismiss blocking bot reviews (Regel F)
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          REVIEWS=$(curl -sS \
            "https://api.github.com/repos/$PR_REPO/pulls/$PR_NUMBER/reviews?per_page=100" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json")

          BOT_CR_IDS=$(echo "$REVIEWS" | jq -r \
            '.[] | select(.state == "CHANGES_REQUESTED" and .user.login == "herbert-consult-code-reviewer[bot]") | .id')

          if [ -z "$BOT_CR_IDS" ]; then
            echo "::notice::Keine offenen CHANGES_REQUESTED-Reviews vom Bot — nichts zu tun"
            exit 0
          fi

          while IFS= read -r REVIEW_ID; do
            [ -z "$REVIEW_ID" ] && continue
            D_RESP=$(curl -sS -w "\n%{http_code}" \
              -X PUT \
              "https://api.github.com/repos/$PR_REPO/pulls/$PR_NUMBER/reviews/$REVIEW_ID/dismissals" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -d '{"message":"Regel F auto-dismiss: svenherbert APPROVED — CHANGES_REQUESTED zurückgezogen."}')
            D_HTTP=$(echo "$D_RESP" | tail -1)
            if [ "$D_HTTP" = "200" ]; then
              echo "::notice::Review $REVIEW_ID dismissed (Regel F)"
            else
              echo "::error::Dismiss fehlgeschlagen (HTTP $D_HTTP)"
              exit 1
            fi
          done <<< "$BOT_CR_IDS"

  auto-close-on-merge:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Close Paperclip review issue on merge
        env:
          PAPERCLIP_API_URL: ${{ vars.PAPERCLIP_API_URL }}
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
          PAPERCLIP_COMPANY_ID: ${{ vars.PAPERCLIP_COMPANY_ID || '9df4976b-9ac8-4e8f-a156-c06c7fa40cdc' }}
          CODE_REVIEWER_AGENT_ID: f2cdbdbc-f456-4ac7-bba6-178ef7422748
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Idempotency fingerprint matches the one set when the issue was created
          REPO_NAME=$(echo "$PR_REPO" | cut -d'/' -f2)
          FINGERPRINT="${REPO_NAME}-pr-${PR_NUMBER}"

          # Fetch open/blocked Code Reviewer issues and match by originFingerprint client-side
          SEARCH_RESP=$(curl -sS -w "\n%{http_code}" \
            "$PAPERCLIP_API_URL/api/companies/$PAPERCLIP_COMPANY_ID/issues?assigneeAgentId=$CODE_REVIEWER_AGENT_ID&status=todo,in_progress,in_review,blocked" \
            -H "Authorization: Bearer $PAPERCLIP_API_KEY")
          SEARCH_HTTP=$(echo "$SEARCH_RESP" | tail -1)
          SEARCH_BODY=$(echo "$SEARCH_RESP" | head -n -1)

          if [ "$SEARCH_HTTP" != "200" ]; then
            echo "::warning::Paperclip-Suche fehlgeschlagen (HTTP $SEARCH_HTTP) — Auto-Close übersprungen"
            exit 0
          fi

          ISSUE_IDS=$(echo "$SEARCH_BODY" | jq -r \
            --arg fp "$FINGERPRINT" \
            '(.issues // .) | map(select(.originFingerprint == $fp)) | .[].id' \
            2>/dev/null || echo "")

          if [ -z "$ISSUE_IDS" ]; then
            echo "::notice::Keine offenen Review-Issues für PR #${PR_NUMBER} in ${PR_REPO} — nichts zu tun"
            exit 0
          fi

          CLOSED_COUNT=0
          while IFS= read -r ISSUE_ID; do
            [ -z "$ISSUE_ID" ] && continue
            PATCH_PAYLOAD=$(jq -n \
              --arg comment "PR #${PR_NUMBER} (${PR_REPO}) wurde gemergt — Auto-Close" \
              '{status: "done", blockedByIssueIds: [], comment: $comment}')
            PATCH_RESP=$(curl -sS -w "\n%{http_code}" -X PATCH \
              "$PAPERCLIP_API_URL/api/issues/$ISSUE_ID" \
              -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$PATCH_PAYLOAD")
            PATCH_HTTP=$(echo "$PATCH_RESP" | tail -1)
            PATCH_BODY=$(echo "$PATCH_RESP" | head -n -1)
            if [ "$PATCH_HTTP" = "200" ]; then
              IDENTIFIER=$(echo "$PATCH_BODY" | jq -r '.identifier // "unknown"')
              echo "::notice::Review-Issue $IDENTIFIER ($ISSUE_ID) → done. PR #${PR_NUMBER} in ${PR_REPO} gemergt."
              CLOSED_COUNT=$((CLOSED_COUNT + 1))
            else
              echo "::error::Issue $ISSUE_ID schließen fehlgeschlagen (HTTP $PATCH_HTTP)"
              echo "$PATCH_BODY"
              exit 1
            fi
          done <<< "$ISSUE_IDS"

          echo "::notice::Auto-Close-on-Merge abgeschlossen — ${CLOSED_COUNT} Issue(s) geschlossen (PR #${PR_NUMBER})"
