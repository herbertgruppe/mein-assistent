services:
  assistent:
    build: .
    container_name: mein-assistent
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - transcripts:/app/transcripts
      - input_docs:/app/input_docs
      - data:/app/data
      - auth:/app/auth
      - users_data:/app/users
      - users_config:/app/config

volumes:
  transcripts:
  input_docs:
  data:
  auth:
  users_data:
  users_config:
