services:
  assistent:
    build: .
    container_name: mein-assistent
    restart: unless-stopped
    ports:
      # Loopback-only — Traffic zwingend durch nginx/TLS
      - "127.0.0.1:8501:8501"
    env_file:
      - .env
    volumes:
      - transcripts:/app/transcripts
      - input_docs:/app/input_docs
      - data:/app/data
      - auth:/app/auth
      - users_data:/app/users
      - users_config:/app/config
      # OIDC-Secrets für st.login() — NICHT im Image, read-only gemountet
      - ./.streamlit/secrets.toml:/app/.streamlit/secrets.toml:ro

  api:
    build: .
    container_name: mein-assistent-api
    restart: unless-stopped
    # Streamlit-Default-CMD überschreiben → FastAPI/Uvicorn
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8502"]
    ports:
      # Loopback-only — Traffic zwingend durch nginx/TLS
      - "127.0.0.1:8502:8502"
    env_file:
      - .env
    volumes:
      # Geteilte Volumes mit assistent — gleiches Outlook-Token, gleiche Daten
      - transcripts:/app/transcripts
      - input_docs:/app/input_docs
      - data:/app/data
      - auth:/app/auth
      - users_data:/app/users
      - users_config:/app/config
      # Vault-Mirror: Sven's Obsidian-Vault (HBE-757)
      # Wird auf dem Host unter /opt/vault-mirror/ geclont (setup-vault-mirror.sh)
      - /opt/vault-mirror:/opt/vault-mirror
      # Plaud-Poller state.db (HBE-1527)
      - /var/lib/plaud-poller:/var/lib/plaud-poller:ro
    depends_on:
      - assistent
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8502/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s

  lena-imap-poller:
    build: .
    container_name: mein-assistent-lena-imap-poller
    restart: unless-stopped
    command: ["python3", "lena_imap_poller.py"]
    env_file:
      - .env
    environment:
      # Logs ins data-Volume schreiben (statt /var/log/ — kein Root-Zugriff im Container)
      LENA_IMAP_LOG_FILE: /app/data/lena-imap-poller.log
    volumes:
      # Nur data-Volume — SQLite-DB + Log-Datei
      - data:/app/data
    healthcheck:
      # Healthy wenn Log-Datei in den letzten 10 Min geschrieben wurde (poll_cycle alle 5 Min)
      test: ["CMD-SHELL", "find /app/data/lena-imap-poller.log -mmin -10 | grep -q ."]
      interval: 5m
      timeout: 10s
      start_period: 30s
      retries: 2

  # HINWEIS (HBE-928, 2026-06-15): lena-asana-poller läuft nicht mehr als
  # Docker-Container, sondern als systemd-Service auf dem Host
  # (mein-assistent-lena-asana-poller.service). Die Service-Datei in diesem
  # Repo ist die Source-of-Truth. Hintergrund: Konsistenz mit plaud-poller
  # (auch systemd) + native Hardening (ProtectSystem=strict, ProtectHome,
  # NoNewPrivileges, PrivateTmp, User=mein-assistent — siehe PR #65/HBE-893).
  # Container-Hardening war nicht praktikabel, weil shared Dockerfile/Image
  # alle 5 mein-assistent-Services (Streamlit-App, API, Pollers, Worker)
  # betroffen hätte. Architektur-Trennung jetzt: UI/App = Docker, Poller = systemd.

volumes:
  transcripts:
  input_docs:
  data:
  auth:
  users_data:
  users_config:
