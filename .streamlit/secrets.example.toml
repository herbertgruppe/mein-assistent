# Streamlit Secrets — OIDC-Login via Herbert-Portal (Authentik)
#
# Kopiere diese Datei zu `.streamlit/secrets.toml` (lokal oder via scp auf
# den Server nach /opt/mein-assistent/.streamlit/secrets.toml) und fülle
# die Platzhalter mit echten Werten.
#
# `.streamlit/secrets.toml` ist in .gitignore — NIEMALS commiten.
#
# cookie_secret erzeugen:
#   openssl rand -hex 32

[auth]
redirect_uri = "https://mein-assistent.herbertgruppe.com/oauth2callback"
cookie_secret = "<openssl rand -hex 32>"

[auth.authentik]
client_id = "<from Authentik Provider>"
client_secret = "<from Authentik Provider>"
server_metadata_url = "https://auth.herbertgruppe.com/application/o/mein-assistent/.well-known/openid-configuration"
client_kwargs = { scope = "openid email profile", prompt = "select_account" }
